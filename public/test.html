<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Test — WordPress CSS simulation</title>

  <!--
    ╔══════════════════════════════════════════════════════════════════╗
    ║  SIMULATED WORDPRESS / ASTRA THEME CSS                          ║
    ║  Mirrors what the live site injects before our widget script.   ║
    ║  This lets us reproduce & fix override issues locally.          ║
    ╚══════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* --- Astra box-sizing reset ------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; }

    /* --- Astra element reset (border:0 on fieldset, hr etc.) ------------- */
    address,blockquote,body,dd,dl,dt,fieldset,figure,h1,h2,h3,h4,h5,h6,
    hr,iframe,legend,li,ol,p,pre,textarea,ul {
      border: 0; font-size: 100%; font-style: inherit; font-weight: inherit;
      margin: 0; outline: 0; padding: 0; vertical-align: baseline;
    }

    /* --- Astra / WP: global input borders -------------------------------- */
    input[type="text"], input[type="email"], input[type="url"],
    input[type="password"], input[type="search"], input[type="number"],
    input[type="tel"], select, textarea {
      color: #333;
      border: 1px solid #ddd;
      border-radius: 2px;
      background-color: #fff;
      padding: 0.5em 1em;
    }

    /* --- Astra CSS custom properties ------------------------------------- */
    :root {
      --ast-global-color-0: #68abe4;
      --ast-global-color-1: #3a3a3a;
      --ast-border-color: rgba(220,220,220,0.5);
    }

    /* --- Page chrome (simulates dark WordPress page) -------------------- */
    body   { margin: 0; background: #000; font-family: sans-serif; color: #eee; }
    .wp-bar    { background: #1e1e1e; padding: 8px 20px; font-size: 12px; color: #888; }
    .wp-wrap   { max-width: 1200px; margin: 0 auto; padding: 32px 20px; }
    .wp-wrap h1 { color: #00A3E0; font-size: 26px; margin-bottom: 20px; }

    /* --- Simulate an aggressive theme that sets border-color globally --- */
    /* (comment-out to test without this override)                          */
    div { border-color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <div class="wp-bar">WordPress — Simulación (CSS aislamiento)</div>
  <div class="wp-wrap">
    <h1>Resultados</h1>
    <!-- Widget mount point -->
    <div id="sportevents-results" data-prefix="strong race"></div>
  </div>

  <!-- Single-file bundle (generated by `npm run bundle`) -->
  <script src="./sportevents-results.js"></script>
</body>
</html>
