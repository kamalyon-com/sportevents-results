name: Build & Deploy Bundle

# Runs when source code or bundle script changes
# Also manually triggerable
on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'scripts/bundle.js'
      - 'package.json'

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest race data
        env:
          REACT_APP_RR_API_KEY: ${{ secrets.RR_API_KEY }}
        run: npm run prefetch

      - name: Build bundle
        env:
          REACT_APP_RR_API_KEY: ${{ secrets.RR_API_KEY }}
          CI: false
        run: npm run bundle

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          keep_files: false
