name: Build & Deploy Bundle

# Runs when source code or bundle script changes
# Also manually triggerable
on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'scripts/bundle.js'
      - 'package.json'

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest race data
        env:
          REACT_APP_RR_API_KEY: ${{ secrets.RR_API_KEY }}
        run: npm run prefetch

      - name: Build bundle
        env:
          REACT_APP_RR_API_KEY: ${{ secrets.RR_API_KEY }}
          CI: false
        run: npm run bundle

      - name: Upload JS bundle + JSON files to WordPress via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./build/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          include: '["sportevents-results.js", "**.json"]'
          exclude: '[]'
          log-level: minimal
