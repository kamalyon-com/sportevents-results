name: Refresh Race Data

# Runs daily at 06:00 UTC (08:00 Madrid summer time)
# Also triggers on push to the prefetch script, and can be run manually
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'scripts/prefetch-results.js'
      - 'package.json'

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch race results from RaceResult API
        env:
          REACT_APP_RR_API_KEY: ${{ secrets.RR_API_KEY }}
        run: npm run prefetch

      - name: Build bundle (includes fresh JSONs)
        env:
          REACT_APP_RR_API_KEY: ${{ secrets.RR_API_KEY }}
          CI: false
        run: npm run bundle

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          keep_files: false
